<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>个人第二大脑</title>
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <header class="topbar">
      <a class="brand" href="./" aria-label="个人第二大脑首页">
        <span>Markdown KB</span>
        <strong>个人第二大脑</strong>
      </a>
      <nav aria-label="主要区域">
        <a href="#tasks">任务</a>
        <a href="#calendar">日程</a>
        <a href="#notes">笔记</a>
      </nav>
    </header>

    <main>
      <section class="hero" aria-labelledby="hero-title">
        <div class="hero-copy">
          <p class="eyebrow">Second Brain</p>
          <h1 id="hero-title">把长期上下文整理成 AI 能读懂的知识库。</h1>
          <p>Markdown 保存，本地维护，公网只发布明确公开的内容。</p>
        </div>
        <div class="stats" aria-label="知识库统计">
          <div><strong id="stat-notes">0</strong><span>公开笔记</span></div>
          <div><strong id="stat-tags">0</strong><span>标签</span></div>
          <div><strong id="stat-tasks">0</strong><span>任务</span></div>
        </div>
      </section>

      <section class="toolbar" aria-labelledby="search-title">
        <div class="toolbar-head">
          <h2 id="search-title">检索</h2>
          <span id="result-count"></span>
        </div>
        <input id="search" type="search" placeholder="搜索标题、摘要、标签" autocomplete="off">
        <div id="type-filters" class="type-filters" aria-label="按类型筛选"></div>
      </section>

      <section class="dashboard-grid">
        <aside class="side" aria-label="近期概览">
          <article id="tasks" class="panel">
            <div class="panel-head">
              <h2>任务</h2>
              <span id="task-count"></span>
            </div>
            <div id="tasks-list" class="compact-list"></div>
          </article>

          <article id="calendar" class="panel">
            <div class="panel-head">
              <h2>近期计划</h2>
              <span id="event-count"></span>
            </div>
            <div id="events-list" class="compact-list"></div>
          </article>

          <article class="panel">
            <h2>标签关系</h2>
            <div id="tags-list" class="tags"></div>
          </article>
        </aside>

        <article id="notes" class="panel notes-panel">
          <div class="panel-head">
            <h2>公开笔记</h2>
            <span id="notes-count"></span>
          </div>
          <div id="notes-list" class="notes-list"></div>
        </article>
      </section>
    </main>

    <footer>
      <span>Generated from Markdown.</span>
      <span id="generated-at"></span>
    </footer>

    <script src="./data.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
