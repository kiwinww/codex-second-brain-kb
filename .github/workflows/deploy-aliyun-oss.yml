name: Deploy to Aliyun OSS

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build static site
        run: python tools/build_site.py

      - name: Install ossutil
        run: |
          curl -L -o ossutil.zip https://gosspublic.alicdn.com/ossutil/1.7.19/ossutil64.zip
          unzip ossutil.zip
          chmod +x ossutil64
          sudo mv ossutil64 /usr/local/bin/ossutil

      - name: Upload to Aliyun OSS
        env:
          ALIYUN_BUCKET: ${{ secrets.ALIYUN_BUCKET }}
          ALIYUN_ENDPOINT: ${{ secrets.ALIYUN_ENDPOINT }}
          ALIYUN_ACCESS_KEY_ID: ${{ secrets.ALIYUN_ACCESS_KEY_ID }}
          ALIYUN_ACCESS_KEY_SECRET: ${{ secrets.ALIYUN_ACCESS_KEY_SECRET }}
        run: |
          ossutil config -e "$ALIYUN_ENDPOINT" -i "$ALIYUN_ACCESS_KEY_ID" -k "$ALIYUN_ACCESS_KEY_SECRET"
          ossutil cp -r -f public/ "oss://$ALIYUN_BUCKET/"

